services:
  openbao:
    image: openbao/openbao:2.2.0
    container_name: openbao
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - docsigning

  openbao-init:
    image: alpine/curl:latest
    container_name: openbao-init
    depends_on:
      openbao:
        condition: service_healthy
    volumes:
      - ./docker/openbao/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - docsigning

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - docsigning

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/documents &&
        echo 'MinIO bucket ready'
      "
    networks:
      - docsigning

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: docsigning
      POSTGRES_USER: docsigning
      POSTGRES_PASSWORD: docsigning
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsigning -d docsigning"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - docsigning

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-signing-app
    depends_on:
      openbao-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      VAULT_HOST: openbao
      VAULT_PORT: 8200
      VAULT_SCHEME: http
      VAULT_TOKEN: root
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: docsigning
      POSTGRES_USER: docsigning
      POSTGRES_PASSWORD: docsigning
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      OBJECT_STORAGE_DEFAULT_BUCKET: documents
    networks:
      - docsigning

volumes:
  postgres_data:
  minio_data:

networks:
  docsigning:
    driver: bridge
