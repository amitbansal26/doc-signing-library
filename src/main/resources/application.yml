spring:
  application:
    name: doc-signing-library
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:docsigning}
    username: ${POSTGRES_USER:docsigning}
    password: ${POSTGRES_PASSWORD:docsigning}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

vault:
  host: ${VAULT_HOST:localhost}
  port: ${VAULT_PORT:8200}
  scheme: ${VAULT_SCHEME:http}
  token: ${VAULT_TOKEN:root}

app:
  vault:
    pki-role: doc-signer
  object-storage:
    endpoint: ${OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
    region: ${OBJECT_STORAGE_REGION:us-east-1}
    access-key-id: ${OBJECT_STORAGE_ACCESS_KEY:minioadmin}
    secret-access-key: ${OBJECT_STORAGE_SECRET_KEY:minioadmin}
    path-style-access: ${OBJECT_STORAGE_PATH_STYLE:true}
    default-bucket: ${OBJECT_STORAGE_DEFAULT_BUCKET:documents}
    signed-object-key-prefix: ${OBJECT_STORAGE_SIGNED_PREFIX:signed/}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
